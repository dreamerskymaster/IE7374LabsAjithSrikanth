<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFG-QC | Manufacturing Quality Control</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00e676;     /* Industrial Green */
            --warning: #ff9100;     /* Amber Warning */
            --danger: #ff1744;      /* Red Alert */
            --bg-dark: #0a0e14;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text: #c8d6e5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(0,230,118,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(255,145,0,0.04) 0%, transparent 50%);
        }

        .container { width: 92%; max-width: 520px; padding: 1rem 0; }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .header .badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            background: rgba(0,230,118,0.1);
            color: var(--primary);
            border: 1px solid rgba(0,230,118,0.25);
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }
        .header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 3px;
        }
        .header p {
            font-size: 0.8rem;
            color: #576574;
            margin-top: 0.4rem;
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(12px);
            margin-bottom: 1.2rem;
        }

        /* Section Label */
        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #576574;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1.2rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        /* Input Grid */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .input-group { position: relative; }
        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: #8395a7;
            margin-bottom: 0.4rem;
            letter-spacing: 0.5px;
        }
        .input-group .unit {
            font-weight: 400;
            color: #576574;
            font-size: 0.6rem;
        }
        .input-group input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,230,118,0.08);
        }
        .input-group input::placeholder { color: #2d3436; }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            margin-top: 1.5rem;
            background: linear-gradient(135deg, #00e676, #00c853);
            border: none;
            border-radius: 10px;
            color: #0a0e14;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(0,230,118,0.25);
        }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Result Card */
        .result-card {
            display: none;
            animation: slideUp 0.4s ease;
        }
        .result-card.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Status Indicator */
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        .status-dot.good { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
        .status-dot.minor { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
        .status-dot.major { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .predicted-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }
        .confidence-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--primary);
        }

        /* Probability Bars */
        .prob-bars { margin-top: 1rem; }
        .prob-row {
            display: flex;
            align-items: center;
            margin-bottom: 0.6rem;
            font-size: 0.72rem;
        }
        .prob-label {
            width: 100px;
            font-weight: 600;
            color: #8395a7;
            flex-shrink: 0;
        }
        .prob-bar-bg {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            overflow: hidden;
            margin: 0 10px;
        }
        .prob-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }
        .prob-bar-fill.good { background: var(--primary); }
        .prob-bar-fill.minor { background: var(--warning); }
        .prob-bar-fill.major { background: var(--danger); }
        .prob-pct {
            width: 45px;
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
            color: #576574;
        }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 0.6rem;
            color: #2d3436;
            margin-top: 1rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(10,14,20,0.3);
            border-radius: 50%;
            border-top-color: #0a0e14;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="badge">Docker Lab 3 · MLOps</div>
        <h1>MFG-QC</h1>
        <p>CNC Machining Defect Prediction System</p>
    </div>

    <div class="card">
        <div class="section-label">⚙ Sensor Input Parameters</div>
        <form id="predictionForm">
            <div class="input-grid">
                <div class="input-group">
                    <label>Spindle Speed <span class="unit">(RPM)</span></label>
                    <input type="number" id="spindle_speed" name="spindle_speed" step="0.1" placeholder="800-3500" required>
                </div>
                <div class="input-group">
                    <label>Feed Rate <span class="unit">(mm/min)</span></label>
                    <input type="number" id="feed_rate" name="feed_rate" step="0.1" placeholder="50-500" required>
                </div>
                <div class="input-group">
                    <label>Depth of Cut <span class="unit">(mm)</span></label>
                    <input type="number" id="depth_of_cut" name="depth_of_cut" step="0.01" placeholder="0.5-5.0" required>
                </div>
                <div class="input-group">
                    <label>Vibration <span class="unit">(mm/s)</span></label>
                    <input type="number" id="vibration" name="vibration" step="0.01" placeholder="0.1-8.0" required>
                </div>
                <div class="input-group">
                    <label>Temperature <span class="unit">(°C)</span></label>
                    <input type="number" id="temperature" name="temperature" step="0.1" placeholder="25-350" required>
                </div>
                <div class="input-group">
                    <label>Tool Wear <span class="unit">(mm)</span></label>
                    <input type="number" id="tool_wear" name="tool_wear" step="0.001" placeholder="0.0-0.6" required>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span id="btnText">▶ Run Prediction</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
        </form>
    </div>

    <div class="card result-card" id="resultCard">
        <div class="section-label">◉ Prediction Result</div>
        
        <div class="status-row">
            <div>
                <span class="status-dot" id="statusDot"></span>
                <span class="predicted-label" id="predictedClass"></span>
            </div>
            <span class="confidence-value" id="confidenceValue"></span>
        </div>

        <div class="prob-bars">
            <div class="prob-row">
                <span class="prob-label">Good</span>
                <div class="prob-bar-bg"><div class="prob-bar-fill good" id="barGood" style="width:0%"></div></div>
                <span class="prob-pct" id="pctGood">0%</span>
            </div>
            <div class="prob-row">
                <span class="prob-label">Minor Defect</span>
                <div class="prob-bar-bg"><div class="prob-bar-fill minor" id="barMinor" style="width:0%"></div></div>
                <span class="prob-pct" id="pctMinor">0%</span>
            </div>
            <div class="prob-row">
                <span class="prob-label">Major Defect</span>
                <div class="prob-bar-bg"><div class="prob-bar-fill major" id="barMajor" style="width:0%"></div></div>
                <span class="prob-pct" id="pctMajor">0%</span>
            </div>
        </div>
    </div>

    <div class="footer">
        MFG-QC v1.0 · AJITH SRIKANTH · DOCKER COMPOSE + SCIKIT-LEARN
    </div>
</div>

<script>
$(document).ready(function() {
    $('#predictionForm').on('submit', function(e) {
        e.preventDefault();
        
        var $btn = $('#submitBtn');
        var $text = $('#btnText');
        var $spin = $('#btnSpinner');
        
        $btn.prop('disabled', true);
        $text.hide();
        $spin.show();

        var formData = {};
        var fields = ['spindle_speed','feed_rate','depth_of_cut','vibration','temperature','tool_wear'];
        fields.forEach(function(f) { formData[f] = $('#'+f).val(); });

        $.ajax({
            type: 'POST',
            url: '/predict',
            data: formData,
            dataType: 'json'
        }).done(function(data) {
            // Update prediction label
            $('#predictedClass').text(data.predicted_class.toUpperCase());
            
            // Confidence
            var confPct = (data.confidence * 100).toFixed(1);
            $('#confidenceValue').text(confPct + '% conf.');
            
            // Status dot color
            var dot = $('#statusDot');
            dot.removeClass('good minor major');
            if (data.predicted_class === 'Good Quality') dot.addClass('good');
            else if (data.predicted_class === 'Minor Defect') dot.addClass('minor');
            else dot.addClass('major');
            
            // Probability bars
            var probs = data.probabilities;
            var good = (probs['Good Quality'] * 100);
            var minor = (probs['Minor Defect'] * 100);
            var major = (probs['Major Defect'] * 100);
            
            $('#barGood').css('width', good + '%');
            $('#pctGood').text(good.toFixed(1) + '%');
            $('#barMinor').css('width', minor + '%');
            $('#pctMinor').text(minor.toFixed(1) + '%');
            $('#barMajor').css('width', major + '%');
            $('#pctMajor').text(major.toFixed(1) + '%');
            
            // Show result
            $('#resultCard').addClass('active');
            
        }).fail(function() {
            alert('Prediction failed. Check sensor input values.');
        }).always(function() {
            $btn.prop('disabled', false);
            $text.show();
            $spin.hide();
        });
    });
});
</script>

</body>
</html>
