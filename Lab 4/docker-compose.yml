version: '3.8'

x-airflow-common: &airflow-common
  build: .
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    MLFLOW_TRACKING_URI: http://mlflow:5001
    PYTHONPATH: /opt/airflow:/opt/airflow/src:/home/airflow/.local/lib/python3.8/site-packages
    DATA_DIR: /opt/airflow/data
    AIRFLOW__WEBSERVER__SECRET_KEY: 'this_is_a_very_secret_key'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - airflow-data:/opt/airflow/data
    - mlflow-artifacts:/opt/airflow/mlflow-artifacts
  user: "${AIRFLOW_UID:-5000}:0"
  depends_on:
    postgres:
      condition: service_healthy
    mlflow:
      condition: service_started

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  mlflow:
    build: .
    environment:
      <<: *airflow-common-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow-data:/opt/airflow/data
      - mlflow-artifacts:/opt/airflow/mlflow-artifacts
    user: "${AIRFLOW_UID:-5000}:0"
    entrypoint: ["/usr/bin/dumb-init", "--"]
    depends_on:
      postgres:
        condition: service_healthy
    command: mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri sqlite:////opt/airflow/mlflow-artifacts/mlflow.db --default-artifact-root /opt/airflow/mlflow-artifacts/artifacts
    ports:
      - "5001:5001"
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 3

  airflow-init:
    <<: *airflow-common
    user: "0:0"
    command: >
      bash -c "mkdir -p /opt/airflow/dags /opt/airflow/logs /opt/airflow/plugins /opt/airflow/data /opt/airflow/mlflow-artifacts/artifacts
      && chown -R 5000:0 /opt/airflow/data /opt/airflow/mlflow-artifacts
      && chmod -R 775 /opt/airflow/data /opt/airflow/mlflow-artifacts
      && airflow db init
      && airflow users create --username airflow --password airflow --firstname Ajith --lastname Srikanth --role Admin --email ajith@example.com"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 2G

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  postgres-data:
  airflow-data:
  mlflow-artifacts:
